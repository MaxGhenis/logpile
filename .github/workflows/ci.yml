name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v9.0.0
      - run: uv sync --all-extras
      - run: uv run ruff check logpile/ tests/
      - run: uv run ruff format --check logpile/ tests/
      - run: uv run pytest tests/ -q
